services:
  postgres:
    image: postgres:17
    container_name: logistream-postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: logistream
      POSTGRES_PASSWORD: logistream
      POSTGRES_DB: logistream

    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - logistream_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logistream -d logistream"]
      interval: 10s
      timeout: 5s
      retries: 5
  
  redis:
    image: redis:8
    container_name: logistream-redis
    restart: unless-stopped

    ports:
      - "6379:6379"
    networks:
      - logistream_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
  
  kafka:
    image: apache/kafka:4.1.2
    container_name: logistream-kafka
    restart: unless-stopped

    ports:
      - "9092:9092"

    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller

      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092

      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT

      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

    networks:
      - logistream_network

volumes:
  postgres_data:

networks:
  logistream_network: 
